<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/script.js"></script>
    <title>Contato | Passa Adiante</title>
</head>

<body>
    <header>
        <nav>
            <img src="../img/logo.svg" alt="Passa Adiante Logo">
            <ul>
                <li><a href="../index.html">Início</a></li>
                <li><a href="./sobre-o-projeto.html">Sobre</a></li>
                <li><a href="./como-participar.html">Como participar</a></li>
                <li><a href="./catalogo.html">Catálogo</a></li>
                <li><a href="./contato.html">Contato</a></li>
            </ul>
            <button>Entrar</button>
            <button>Cadastre-se</button>
        </nav>
    </header>

    <main>
        <section id="contact-section">
            <h1>Contato</h1>
            <p>Entre em contato conosco preenchendo os dados abaixo e enviando sua mensagem.</p>
            <form action="#" method="POST">

                <div>
                    <label for="nome">Nome</label>
                    <input
                        type="text"
                        id="nome"
                        name="nome"
                        required
                    >
                </div>

                <div>
                    <label for="email">E-mail</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                    >
                </div>

                <div>
                    <label for="assunto">Assunto</label>
                    <input
                        type="text"
                        id="assunto"
                        name="assunto"
                    >
                </div>

                <div>
                    <label for="mensagem">Mensagem</label>
                    <textarea
                        id="mensagem"
                        name="mensagem"
                        rows="6"
                        required
                    ></textarea>
                </div>

                <button type="submit">
                    Enviar
                </button>

            </form>
        </section>
    </main>

    <footer>
        © 2026 PassaAdiante - Todos os direitos reservados
    </footer>
</body>

</html>
